<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaNest</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="dark">

    <nav id="main-nav">
        <div class="logo" onclick="setView('home')">MediaNest</div>
        
        <div id="nav-auth-links">
            <button onclick="setView('login')" class="auth-guest">Login</button>
            <button onclick="setView('signup')" class="auth-guest">Sign Up</button>
            <button onclick="setView('collection')" class="auth-user" style="display:none;">My Collection</button>
            <button onclick="logout()" class="auth-user" style="display:none;">Logout</button>
        </div>
        
        <button onclick="toggleThemePicker()" class="btn-theme">🎨 Themes</button>
    </nav>

    <div id="theme-picker-container" style="display: none;"></div>

    <main id="main-content">
        
        <section id="view-home" class="view-panel">
            <div class="hero-content">
                <h1>Welcome to MediaNest</h1>
                <p>Track your books, movies, and media seamlessly.</p>

                <div id="home-media-grid"></div>
                
                <button onclick="setView('login')" class="btn-primary">Get Started</button>
            </div>
        </section>

        <section id="view-login" class="view-panel" style="display: none;">
            <div class="auth-card">
                <h3>Login to your Nest</h3>
                <input type="email" id="login-email" placeholder="Email Address">
                <input type="password" id="login-password" placeholder="Password">
                <button onclick="doLogin()" class="btn-submit">Login</button>
            </div>
        </section>

        <section id="view-signup" class="view-panel" style="display: none;">
            <div class="auth-card">
                <h3>Create an Account</h3>
                <input type="email" id="signup-email" placeholder="Email Address">
                <input type="password" id="signup-password" placeholder="Password">
                <button onclick="doSignup()" class="btn-submit">Sign Up</button>
            </div>
        </section>

        <section id="view-collection" class="view-panel" style="display: none;">
            <h2>My Collection</h2>
            
            <div class="search-tools">
                <div class="tool-group">
                    <input type="text" id="barcode-manual" placeholder="Enter barcode or ISBN...">
                    <button onclick="lookupBarcode()">Lookup Barcode</button>
                </div>
                <div class="tool-group">
                    <input type="text" id="title-search" placeholder="Search by title...">
                    <button onclick="searchBookByTitle()">Search Title</button>
                </div>
            </div>

            <div class="scanner-container">
                <div class="scanner-controls">
                    <button onclick="startCamera()">📷 Open Camera</button>
                    <button onclick="stopCamera()">Stop Camera</button>
                    <button onclick="captureFrame()">Scan Frame</button>
                </div>
                
                <video id="scanner-video" autoplay playsinline style="display:none;"></video>
                
                <div id="scan-dropzone" ondragover="event.preventDefault()" ondrop="handleScanDrop(event)">
                    Drop barcode image here or 
                    <input type="file" onchange="handleScanFile(event)">
                </div>
            </div>

            <div id="scan-result" style="display: none;"></div>

            <div id="media-grids"></div>
            <div id="media-container"></div>
        </section>
    </main>

    <div id="modal-detail" class="modal" style="display: none;">
        <div class="modal-content">
            <div id="detail-body"></div>
            <div class="modal-actions">
                <button onclick="openTrade()" class="btn-trade">Trade This Item</button>
                <button onclick="saveItem()" class="btn-save">Save Changes</button>
                <button onclick="deleteItem()" class="btn-delete">Delete Item</button>
                <button onclick="document.getElementById('modal-detail').style.display='none'" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <div id="modal-trade" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Trade/Transfer Item Setup</h3>
            <div id="trade-dropzone" ondragover="event.preventDefault()" ondrop="handleCoverScanDrop(event)">
                Drop cover imagery updates here or
                <input type="file" onchange="handleCoverScanFile(event)">
            </div>
            <button onclick="document.getElementById('modal-trade').style.display='none'" class="btn-close">Cancel</button>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
